spring.application.name=reading-tracker

# ===== 本番用(Neon Postgres) =====
# 実際の接続情報はRenderの環境変数で設定する(ここには書かない):
#   SPRING_DATASOURCE_URL      例: jdbc:postgresql://ep-xxxx-pooler.aws.neon.tech/readingtracker?sslmode=require
#   SPRING_DATASOURCE_USERNAME 例: readingtracker_owner
#   SPRING_DATASOURCE_PASSWORD Neonが発行したパスワード
# Spring Bootはこれらの環境変数を spring.datasource.* に自動でバインドしてくれる。
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=8080
